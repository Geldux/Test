<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fuel Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <div class="max-w-2xl mx-auto px-4 py-10">

    <!-- Header -->
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-white">Fuel Tracker</h1>
      <p class="text-gray-400 mt-1 text-sm">Log your fill-ups and track consumption</p>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <div class="bg-gray-800 rounded-xl p-4 text-center">
        <p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Avg Consumption</p>
        <p id="avg-consumption" class="text-2xl font-bold text-blue-400">—</p>
        <p class="text-xs text-gray-500">L/100km</p>
      </div>
      <div class="bg-gray-800 rounded-xl p-4 text-center">
        <p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Total Spent</p>
        <p id="total-spent" class="text-2xl font-bold text-green-400">—</p>
        <p class="text-xs text-gray-500">currency</p>
      </div>
      <div class="bg-gray-800 rounded-xl p-4 text-center">
        <p class="text-xs text-gray-400 uppercase tracking-wide mb-1">Total KM</p>
        <p id="total-km" class="text-2xl font-bold text-purple-400">—</p>
        <p class="text-xs text-gray-500">kilometers</p>
      </div>
    </div>

    <!-- Add Fill-up Form -->
    <div class="bg-gray-800 rounded-xl p-6 mb-8">
      <h2 class="text-lg font-semibold mb-4 text-white">Add Fill-up</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1">Date</label>
          <input id="inp-date" type="date" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500"/>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Odometer (km)</label>
          <input id="inp-odometer" type="number" placeholder="e.g. 45320" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"/>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Liters</label>
          <input id="inp-liters" type="number" step="0.01" placeholder="e.g. 42.5" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"/>
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1">Price per Liter</label>
          <input id="inp-price" type="number" step="0.001" placeholder="e.g. 1.85" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-blue-500"/>
        </div>
      </div>
      <p id="form-error" class="text-red-400 text-xs mt-3 hidden"></p>
      <button onclick="addEntry()" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors text-sm">
        Add Fill-up
      </button>
    </div>

    <!-- Log Table -->
    <div class="bg-gray-800 rounded-xl overflow-hidden">
      <div class="px-6 py-4 border-b border-gray-700 flex justify-between items-center">
        <h2 class="text-lg font-semibold text-white">Fill-up Log</h2>
        <button onclick="clearAll()" class="text-xs text-red-400 hover:text-red-300 transition-colors">Clear all</button>
      </div>
      <div id="log-empty" class="px-6 py-10 text-center text-gray-500 text-sm">
        No fill-ups yet. Add your first one above.
      </div>
      <table id="log-table" class="w-full text-sm hidden">
        <thead>
          <tr class="text-xs text-gray-400 uppercase tracking-wide border-b border-gray-700">
            <th class="px-4 py-3 text-left">Date</th>
            <th class="px-4 py-3 text-right">Odometer</th>
            <th class="px-4 py-3 text-right">Liters</th>
            <th class="px-4 py-3 text-right">Cost</th>
            <th class="px-4 py-3 text-right">L/100km</th>
            <th class="px-4 py-3 text-right"></th>
          </tr>
        </thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>

  </div>

  <script>
    const STORAGE_KEY = 'fuel_entries';

    function load() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function save(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function showError(msg) {
      const el = document.getElementById('form-error');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3000);
    }

    function addEntry() {
      const date     = document.getElementById('inp-date').value;
      const odometer = parseFloat(document.getElementById('inp-odometer').value);
      const liters   = parseFloat(document.getElementById('inp-liters').value);
      const price    = parseFloat(document.getElementById('inp-price').value);

      if (!date)             return showError('Please enter a date.');
      if (isNaN(odometer) || odometer <= 0) return showError('Please enter a valid odometer reading.');
      if (isNaN(liters)   || liters   <= 0) return showError('Please enter a valid liter amount.');
      if (isNaN(price)    || price    <= 0) return showError('Please enter a valid price per liter.');

      const entries = load();
      if (entries.length && odometer <= entries[entries.length - 1].odometer) {
        return showError('Odometer must be greater than the previous entry.');
      }

      entries.push({ date, odometer, liters, price });
      save(entries);
      render();

      document.getElementById('inp-date').value     = '';
      document.getElementById('inp-odometer').value = '';
      document.getElementById('inp-liters').value   = '';
      document.getElementById('inp-price').value    = '';
    }

    function deleteEntry(index) {
      const entries = load();
      entries.splice(index, 1);
      save(entries);
      render();
    }

    function clearAll() {
      if (confirm('Delete all fill-up entries?')) {
        save([]);
        render();
      }
    }

    function calcConsumption(entries, i) {
      if (i === 0) return null;
      const km = entries[i].odometer - entries[i - 1].odometer;
      if (km <= 0) return null;
      return (entries[i].liters / km) * 100;
    }

    function render() {
      const entries = load();
      const tbody   = document.getElementById('log-body');
      const table   = document.getElementById('log-table');
      const empty   = document.getElementById('log-empty');

      tbody.innerHTML = '';

      if (entries.length === 0) {
        table.classList.add('hidden');
        empty.classList.remove('hidden');
        document.getElementById('avg-consumption').textContent = '—';
        document.getElementById('total-spent').textContent     = '—';
        document.getElementById('total-km').textContent        = '—';
        return;
      }

      table.classList.remove('hidden');
      empty.classList.add('hidden');

      let consumptions = [];
      let totalSpent   = 0;

      entries.forEach((e, i) => {
        const cons     = calcConsumption(entries, i);
        const cost     = e.liters * e.price;
        totalSpent    += cost;
        if (cons !== null) consumptions.push(cons);

        const tr = document.createElement('tr');
        tr.className = 'border-b border-gray-700/50 hover:bg-gray-700/30 transition-colors';
        tr.innerHTML = `
          <td class="px-4 py-3 text-gray-300">${e.date}</td>
          <td class="px-4 py-3 text-right text-gray-300">${e.odometer.toLocaleString()}</td>
          <td class="px-4 py-3 text-right text-gray-300">${e.liters.toFixed(2)}</td>
          <td class="px-4 py-3 text-right text-gray-300">${cost.toFixed(2)}</td>
          <td class="px-4 py-3 text-right font-medium ${cons === null ? 'text-gray-500' : cons > 10 ? 'text-red-400' : cons > 7 ? 'text-yellow-400' : 'text-green-400'}">
            ${cons === null ? '—' : cons.toFixed(1)}
          </td>
          <td class="px-4 py-3 text-right">
            <button onclick="deleteEntry(${i})" class="text-gray-600 hover:text-red-400 transition-colors text-xs">✕</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      const avg = consumptions.length
        ? consumptions.reduce((a, b) => a + b, 0) / consumptions.length
        : null;

      const totalKm = entries.length >= 2
        ? entries[entries.length - 1].odometer - entries[0].odometer
        : null;

      document.getElementById('avg-consumption').textContent = avg ? avg.toFixed(1) : '—';
      document.getElementById('total-spent').textContent     = totalSpent.toFixed(2);
      document.getElementById('total-km').textContent        = totalKm ? totalKm.toLocaleString() : '—';
    }

    // Set default date to today
    document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];

    render();
  </script>
</body>
</html>
